[DEFAULT]
# Database connection string
# Format: postgresql://user:password@host:port/database
# POSTGRESQL_HOST=192.168.1.184
# POSTGRESQL_PORT=5432
# POSTGRESQL_USER=postgres
# POSTGRESQL_PASSWORD=postgres
# POSTGRESQL_DB=db-eye-budget
# Simple local setup (adjust as needed):
# database = postgresql://${POSTGRESQL_USER}:${POSTGRESQL_PASSWORD}@${POSTGRESQL_HOST}:${POSTGRESQL_PORT}/${POSTGRESQL_DB}
database = postgresql://postgres:postgres@192.168.1.184:5432/db-eye-budget

# Directory containing migration scripts
sources = migrations

# Batch mode: apply migrations without prompting
batch_mode = false

# Verbosity level
verbosity = 2

